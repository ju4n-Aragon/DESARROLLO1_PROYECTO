<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Consultores S.A.S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="modo-login">

    <div class="card login-card bg-white">
        <div class="card-body">
            <h3 class="text-center mb-4" style="color: #2C3E50; font-weight: bold;">Consultores S.A.S</h3>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="/">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                
                <button type="submit" class="boton-principal">INGRESAR</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('registro') }}" class="text-secondary small">¿No tienes cuenta? Regístrate aquí</a>
            </div>
        </div>
    </div>

</body>
</html>
